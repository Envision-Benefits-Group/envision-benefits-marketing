services:
  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
    restart: always  # Add restart policy

  # Database Service
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always  # Add restart policy

  # Database Backup Service
  db_backup:
    image: kartoza/pg-backup:17-3.5  # Use the version matching your PostgreSQL version
    container_name: postgres_db_backup
    env_file:
      - .env  # Contains database credentials and other environment variables
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_DBNAME: ${POSTGRES_DB}
      DUMPPREFIX: "PG"
      CRON_SCHEDULE: "0 2 * * *" # Run daily at 2 AM
#      REMOVE_BEFORE: 7  # Keep backups for 7 days
    volumes:
      - ./backups:/backups  # Mount the host backups directory
    depends_on:
      - db
    restart: always

  # Qdrant Vector Database
#  qdrant:
#    image: qdrant/qdrant:v1.14.0
#    container_name: qdrant
#    ports:
#      - "6333:6333"  # REST API
#      - "6334:6334"  # gRPC API
#    volumes:
#      - qdrant_data:/qdrant/storage
#    restart: always
#
#  # Text Embeddings Inference Service (TEI)
#  tei_cpu:
#    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
#    container_name: text_embeddings_cpu
#    env_file:
#      - .env
#    environment:
#      - HF_API_TOKEN=${HF_API_TOKEN}
#      - API_KEY=${TEI_API_KEY}
#    command: ["--model-id", "${MODEL_ID}", "--hf-api-token", "${HF_API_TOKEN}", "--api-key", "${TEI_API_KEY}", "--port", "3000", "--hostname", "0.0.0.0", "--auto-truncate"]
#    ports:
#      - "8081:3000"                              # Expose the service on port 8081
#    volumes:
#      - tei_data:/data                           # Optional: persists model weights
#    restart: always

  # Frontend Next.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: dev.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}  # Pass API URL during build
#        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}  # Pass Stripe key during build
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env  # Load environment variables from the file
    depends_on:
      - backend
    restart: always  # Add restart policy

  # Mailpit Service (For Local Email Testing)
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "8025:8025"  # Web UI for viewing emails
      - "1025:1025"  # SMTP server
    volumes:
      - mailpit_data:/data  # Added volume for mailpit data persistence
    environment:
      - MP_DATABASE=/data/mailpit.db  # Use a persistent database file
    restart: always

volumes:
  postgres_data:
  mailpit_data:  # Added named volume for mailpit data
